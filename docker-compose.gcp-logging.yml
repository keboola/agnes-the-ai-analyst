# GCP Cloud Logging overlay — ships container stdout/stderr to Google Cloud
# Logging via Docker's built-in `gcplogs` driver.
#
# Engaged ONLY on GCE VMs, by the Terraform startup-script appending this file
# to COMPOSE_FILE (infra/modules/customer-instance/startup-script.sh.tpl). It is
# deliberately NOT part of the generic OSS prod stack (docker-compose.prod.yml):
# the gcplogs driver requires Google ADC from the GCE metadata server, so on a
# non-GCP host the containers would fail to start. Keeping it in a separate,
# infra-engaged overlay preserves the vendor-agnostic OSS deployment.
#
# The driver auto-detects the GCP project and the instance name/id/zone from the
# metadata server, writes under resource `gce_instance` (next to the VM/system
# logs) to logName `gcplogs-docker-driver`, and tags each entry with
# `jsonPayload.container.name` (e.g. "/agnes-app-1") so services stay
# distinguishable in the Logs Explorer. The VM service account already carries
# roles/logging.logWriter, so no IAM change is required.
#
# `docker logs` / `docker compose logs` keep working via Docker's dual-logging
# local cache (Docker >= 20.10).
services:
  app:
    logging:
      driver: gcplogs
  scheduler:
    logging:
      driver: gcplogs
  caddy:
    logging:
      driver: gcplogs
  telegram-bot:
    logging:
      driver: gcplogs
  ws-gateway:
    logging:
      driver: gcplogs
  extract:
    logging:
      driver: gcplogs
