; Agnes — Alembic config for Postgres state.
;
; Production: reads URL from AGNES_DB_URL env var via migrations/env.py.
; Tests: pass URL via cfg.attributes["sqlalchemy.url"] or env var.
;
; Do NOT set sqlalchemy.url here — configparser interpolates `%` which
; breaks pgserver/Cloud SQL connection strings that contain percent-
; encoded socket paths.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
