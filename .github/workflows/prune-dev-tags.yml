name: Prune dev tags

# Weekly housekeeping for two kinds of dev/stable image identity:
#   1. Legacy CalVer git tags + GHCR images (dev-YYYY.MM.N / stable-YYYY.MM.N)
#      — KEEP_MONTHS retention (current + previous month by default).
#   2. New run-number GHCR images (dev-N / stable-N) — KEEP_RECENT retention
#      (newest 50 per channel by default), skips floating-alias-bearing
#      versions (:stable, :dev, *-latest). Manual trigger supports dry-run
#      + KEEP_MONTHS / KEEP_RECENT overrides.

on:
  schedule:
    - cron: '0 4 * * 0'  # Sundays 04:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only — list tags that would be pruned, do not delete'
        type: boolean
        default: true
      keep_months:
        description: 'Keep current month + this many previous months (e.g. 1 = 2 months total)'
        type: string
        default: '1'
      keep_recent:
        description: 'Keep newest N per-channel run-number GHCR versions (dev-N / stable-N)'
        type: string
        default: '50'

permissions:
  contents: write   # delete git tags (legacy CalVer)
  packages: write   # delete GHCR image versions

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run prune
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_MONTHS: ${{ inputs.keep_months || '1' }}
          KEEP_RECENT: ${{ inputs.keep_recent || '50' }}
          PRUNE_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: bash scripts/ops/prune-dev-tags.sh
