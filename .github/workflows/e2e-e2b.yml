# e2e-e2b.yml — opt-in CI workflow that runs the cloud-chat E2E suite
# against real E2B sandboxes.
#
# Replaces the pre-E2B `.github/workflows/e2e-nsjail.yml`, which built
# the nsjail image + applied iptables rules + ran the nsjail-escape
# smoke suite. Under the E2B-provider model the docker stack is just a
# plain FastAPI container — the isolation work moves to E2B's microVMs.
#
# Cost note (per Q7): every push that triggers this workflow burns real
# E2B sandbox minutes. The operator monitors per-PR cost in the E2B
# dashboard. To bypass, drop the workflow_dispatch button + comment out
# the on-push trigger.

name: e2e-e2b

on:
  workflow_dispatch:
  # Disabled by default — uncomment when an operator opts into per-PR
  # E2B billing.
  # pull_request:
  #   paths:
  #     - 'app/chat/**'
  #     - 'tests/e2e/**'
  #     - 'app/initial_workspace_default/e2b-template/**'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AGNES_E2E: '1'
      AGNES_E2E_E2B: '1'
      AGNES_E2E_ANTHROPIC: '1'
      # GitHub Secrets — required to be set on the repo or org.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      # Operator picks the template id; defaults to the build the
      # template README walks through.
      E2B_TEMPLATE_ID: ${{ secrets.E2B_TEMPLATE_ID || 'agnes-chat' }}
    steps:
      - name: Refuse to run without API keys
        if: ${{ env.ANTHROPIC_API_KEY == '' || env.E2B_API_KEY == '' }}
        run: |
          echo "::error::ANTHROPIC_API_KEY and E2B_API_KEY must be set as GitHub secrets"
          exit 1

      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev,server]"

      - name: Run E2B smoke (real sandbox spawn)
        run: .venv/bin/pytest tests/e2e/test_e2b_smoke.py -v --tb=short

      - name: Run E2B-fronted F.* scenarios
        run: |
          .venv/bin/pytest \
            tests/e2e/test_workspace_init.py \
            tests/e2e/test_chat_web.py \
            tests/e2e/test_adversarial.py \
            -v --tb=short
