{% extends "base.html" %}
{% block title %}User management — {{ config.INSTANCE_NAME }}{% endblock %}

{% block content %}
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>User management</h2>
    <button class="btn btn-primary" onclick="openCreateModal()">+ Add user</button>
  </div>

  <table class="table table-striped" id="users-table">
    <thead>
      <tr>
        <th>Email</th><th>Name</th><th>Role</th><th>Active</th>
        <th>Created</th><th>Deactivated</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- rows rendered by JS -->
    </tbody>
  </table>
</div>

<div class="modal" id="create-modal" style="display:none;">
  <div class="modal-content">
    <h3>Add user</h3>
    <label>Email <input id="new-email" type="email" required></label>
    <label>Name <input id="new-name" type="text"></label>
    <label>Role
      <select id="new-role">
        <option value="viewer">viewer</option>
        <option value="analyst" selected>analyst</option>
        <option value="km_admin">km_admin</option>
        <option value="admin">admin</option>
      </select>
    </label>
    <label style="display:flex; align-items:center; gap:.5em; margin-top:.5em;">
      <input id="new-send-invite" type="checkbox" checked>
      Send invitation link (generate setup token and email it)
    </label>
    <button class="btn btn-primary" onclick="createUser()">Create</button>
    <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
  </div>
</div>

<div class="modal" id="link-modal" style="display:none;">
  <div class="modal-content">
    <h3 id="link-title">Invite link</h3>
    <p id="link-subtitle" class="text-muted"></p>
    <input id="link-url" type="text" readonly style="width:100%; font-family:monospace; padding:.5em;">
    <div style="margin-top:.75em; display:flex; gap:.5em;">
      <button class="btn btn-primary btn-sm" onclick="copyLinkUrl()">Copy link</button>
      <button class="btn btn-secondary btn-sm" onclick="closeLinkModal()">Close</button>
    </div>
  </div>
</div>

<div class="modal" id="setpwd-modal" style="display:none;">
  <div class="modal-content">
    <h3>Set password</h3>
    <p id="setpwd-email" class="text-muted"></p>
    <label>New password <input id="setpwd-input" type="password" minlength="8" autocomplete="new-password" required></label>
    <div style="margin-top:.75em; display:flex; gap:.5em;">
      <button class="btn btn-primary btn-sm" onclick="confirmSetPassword()">Set password</button>
      <button class="btn btn-secondary btn-sm" onclick="closeSetPwdModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = "/api/users";
let _setPwdTargetId = null;

function fmtDate(s) { return s ? s.slice(0, 19).replace("T", " ") : ""; }

async function loadUsers() {
  const r = await fetch(API, {credentials: "include"});
  if (!r.ok) { alert("Failed to load users: " + r.status); return; }
  const users = await r.json();
  const tbody = document.querySelector("#users-table tbody");
  tbody.innerHTML = "";
  for (const u of users) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${u.email}</td>
      <td>${u.name || ""}</td>
      <td>
        <select onchange="setRole('${u.id}', this.value)">
          ${["viewer","analyst","km_admin","admin"].map(r =>
            `<option value="${r}" ${r===u.role?"selected":""}>${r}</option>`).join("")}
        </select>
      </td>
      <td>
        <input type="checkbox" ${u.active?"checked":""}
          onchange="toggleActive('${u.id}', this.checked)">
      </td>
      <td>${fmtDate(u.created_at)}</td>
      <td>${fmtDate(u.deactivated_at)}</td>
      <td>
        <button class="btn btn-sm" onclick="resetPassword('${u.id}')">Reset</button>
        <button class="btn btn-sm" onclick="openSetPwdModal('${u.id}','${u.email}')">Set pwd</button>
        <button class="btn btn-sm btn-danger" onclick="delUser('${u.id}','${u.email}')">Delete</button>
      </td>`;
    tbody.appendChild(tr);
  }
}

async function setRole(id, role) {
  const r = await fetch(`${API}/${id}`, {
    method: "PATCH", credentials: "include",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({role}),
  });
  if (!r.ok) { alert("Failed: " + (await r.text())); }
  loadUsers();
}

async function toggleActive(id, active) {
  const path = active ? "activate" : "deactivate";
  const r = await fetch(`${API}/${id}/${path}`, {method: "POST", credentials: "include"});
  if (!r.ok) { alert("Failed: " + (await r.text())); }
  loadUsers();
}

async function resetPassword(id) {
  if (!confirm("Generate a password reset link?")) return;
  const r = await fetch(`${API}/${id}/reset-password`, {method: "POST", credentials: "include"});
  const data = await r.json();
  if (!r.ok) { alert("Failed: " + data.detail); return; }
  const note = data.email_sent
    ? "Email sent. Copy the link below only if you need to deliver it manually."
    : "Email transport unavailable — send this link to the user directly.";
  showLink("Password reset link", note, data.reset_url);
}

function openSetPwdModal(id, email) {
  _setPwdTargetId = id;
  document.getElementById("setpwd-email").textContent = email;
  document.getElementById("setpwd-input").value = "";
  document.getElementById("setpwd-modal").style.display = "block";
  setTimeout(() => document.getElementById("setpwd-input").focus(), 50);
}
function closeSetPwdModal() {
  document.getElementById("setpwd-modal").style.display = "none";
  _setPwdTargetId = null;
}
async function confirmSetPassword() {
  const pwd = document.getElementById("setpwd-input").value;
  if (!pwd || pwd.length < 8) { alert("Password must be at least 8 characters."); return; }
  const r = await fetch(`${API}/${_setPwdTargetId}/set-password`, {
    method: "POST", credentials: "include",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({password: pwd}),
  });
  if (!r.ok) { alert("Failed: " + (await r.text())); return; }
  closeSetPwdModal();
  alert("Password set.");
}

async function delUser(id, email) {
  if (!confirm(`Delete ${email}? This cannot be undone.`)) return;
  const r = await fetch(`${API}/${id}`, {method: "DELETE", credentials: "include"});
  if (!r.ok) { alert("Failed: " + (await r.text())); return; }
  loadUsers();
}

function openCreateModal() { document.getElementById("create-modal").style.display = "block"; }
function closeCreateModal() { document.getElementById("create-modal").style.display = "none"; }

async function createUser() {
  const email = document.getElementById("new-email").value;
  const name = document.getElementById("new-name").value;
  const role = document.getElementById("new-role").value;
  const sendInvite = document.getElementById("new-send-invite").checked;
  const r = await fetch(API, {
    method: "POST", credentials: "include",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, name: name || email.split("@")[0], role, send_invite: sendInvite}),
  });
  if (!r.ok) { alert("Failed: " + (await r.text())); return; }
  const data = await r.json();
  closeCreateModal();
  loadUsers();
  if (data.invite_url) {
    const note = data.invite_email_sent
      ? "Email sent. Copy the link below only if you need to deliver it manually."
      : "Email transport unavailable — send this link to the user directly.";
    showLink("Invitation link", note, data.invite_url);
  }
}

function showLink(title, subtitle, url) {
  document.getElementById("link-title").textContent = title;
  document.getElementById("link-subtitle").textContent = subtitle;
  document.getElementById("link-url").value = url;
  document.getElementById("link-modal").style.display = "block";
  setTimeout(() => document.getElementById("link-url").select(), 50);
}
function closeLinkModal() { document.getElementById("link-modal").style.display = "none"; }
function copyLinkUrl() {
  const el = document.getElementById("link-url");
  el.select();
  navigator.clipboard.writeText(el.value);
}

loadUsers();
</script>
{% endblock %}
