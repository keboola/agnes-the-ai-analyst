[pytest]
addopts = -m "not live and not docker" --timeout=60 --strict-markers
# A full-suite run writes 20-50 GB of DuckDB/parquet/pgserver fixtures into
# pytest's basetemp; the default keeps the last 3 sessions in full, which
# accumulated 56+ GB and filled the disk. Retain a single session so the
# next run's startup sweep reclaims the prior one (~3x less peak usage).
tmp_path_retention_count = 1
# DO NOT set this to `failed`. `failed` deletes each passing test's tmp_path
# in its teardown finalizer, mid-session — but the app caches an open DuckDB
# system-DB connection under ${DATA_DIR}/state (get_system_db() singleton in
# src/db.py). Deleting the dir out from under the live handle desyncs the
# singleton from disk, and later tests sharing the process hit
# `Duplicate key "id: admin1"` in the seeded_app fixture (~57 spurious errors
# across the suite). `all` keeps dirs until the count-based startup sweep,
# which is the disk win we actually need without the landmine.
tmp_path_retention_policy = all
markers =
    live: tests requiring server access (run with '-m live')
    docker: tests requiring Docker (run with '-m docker')
    integration: FastAPI TestClient API integration tests
    journey: end-to-end user flow tests spanning multiple components
    slow: slow tests that spawn real subprocesses or bind network sockets
    no_routing_override: opt out of test_self_upgrade.py's autouse fixture that defaults `_python_is_uv_tool_install` to True
    e2b: real-e2b-SDK smoke tests, key-gated (skipped unless E2B_API_KEY is set); run nightly / pre-release with the secret present
